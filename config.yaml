# ════════════════════════════════════════════════════════════════════════
#  ModulUS system definition — the digital-twin spec.
#  Edit these to model a different board/configuration; modulus.py reads this
#  file at import. Grouped by hardware module (mirrors the twins).
#
#  Each entry carries:
#    value:   the number used by the model
#    ref:     provenance / citation
#    status:  editorial confidence —
#       verified           strong primary/standard source, value matches
#       order-of-magnitude representative value; metric/source solid, exact figure not pinned
#       model-assumption   a number WE chose (no literature source; do not cite as measured)
#       unverified         value not confirmed against a source — author must check
#       strengthen-ref     value plausible/in-range, but citation found is weak (need better)
# ════════════════════════════════════════════════════════════════════════

physics:
  speed_of_sound_ms:
    value: 1540
    ref: "Standard soft-tissue value in pulse-echo ultrasound; AIUM; used in ModulUS IUS-2025 (cf. O'Brien, Prog. Biophys. Mol. Biol. 2007)."
    status: verified
  pulse_cycles:
    value: 5
    ref: "Design choice; ModulUS IUS-2025 experimental setup used 5-cycle excitation."
    status: verified

# ── Pulse board: pulser (STHVUP32) + T/R switch — send the pulse ──────────
pulse:
  channels_exposed:
    value: 8
    ref: "ModulUS IUS-2025: STHVUP32 pulser, 8 of 32 channels exposed."
    status: verified
  power_w:
    value: 0.001
    ref: "Generic low-duty Tx, part of the ~20 mW static budget. NOT a literature value."
    status: model-assumption

# ── Echo board: AFE envelope detector — catch & condition the echo ────────
echo:
  bandwidth_reduction:
    value: 4
    ref: "ModulUS IUS-2025: raw mean 2.9 MHz -> envelope 0.7 MHz (~4x); 20 -> 5 Msps."
    status: verified
  power_bias_w:
    value: 0.004
    ref: "Generic always-on AFE bias, part of the ~20 mW budget. NOT a literature value."
    status: model-assumption
  power_active_w:
    value: 0.003
    ref: "Generic duty-scaled AFE active draw, part of the ~20 mW budget. NOT a literature value."
    status: model-assumption

# ── Core board: STM32L496 + dual 5 Msps ADC — digitize & compute ──────────
core:
  adc_nyquist_factor:
    value: 2
    ref: "Nyquist-Shannon sampling theorem (fs >= 2x signal bandwidth)."
    status: verified
  adc_fs_max_hz:
    value: 5.0e+6
    ref: "STM32L496xx datasheet (ST): on-chip 12-bit ADC up to 5 Msps."
    status: verified
  adc_fom_j:
    value: 50.0e-15
    ref: "Walden FoM = P/(2^ENOB*fs). 50 fJ/conv-step is a representative MCU-class value (efficient dedicated ADCs are <10 fJ). Cf. Walden, IEEE JSAC 1999; Murmann ADC Survey. P_adc is negligible at our duty cycles."
    status: order-of-magnitude
  power_idle_w:
    value: 0.015
    ref: "Generic MCU + housekeeping floor (dominates the ~20 mW budget). NOT a literature value."
    status: model-assumption
  power_feature_w:
    value: 0.002
    ref: "Generic on-device feature-compute draw. NOT a literature value."
    status: model-assumption
  feature_count:
    value: 16
    ref: "Illustrative features-mode payload per A-line (design choice)."
    status: model-assumption

# ── Radio: BLE — downstream add-on, NOT a ModulUS board ───────────────────
radio:
  energy_per_bit_j:
    value: 20.0e-9
    ref: "Order-of-magnitude estimate (~10-50 nJ/bit effective). Consistent with measured BLE efficiency (Siekkinen et al., IEEE WCNCW 2012) but strongly payload/interval-dependent — NOT a fixed constant."
    status: unverified
  throughput_max_bps:
    value: 1.0e+6
    ref: "Conservative usable BLE ceiling. BLE 5 LE-2M application throughput tops ~1.3-1.4 Mb/s; we use 1 Mb/s. Cf. Tosi et al., Sensors 2017 (BLE performance review)."
    status: verified

# ── Battery: external power source ────────────────────────────────────────
battery:
  density_vol_wh_l:
    value: 400
    ref: "Within commercial Li-ion range (300-700 Wh/L); conservative for small-format cells. Only vendor/handbook sources found - peer-reviewed cite TBD (candidate: Schmuch et al., Nat. Energy 2018)."
    status: strengthen-ref
  density_grav_wh_kg:
    value: 230
    ref: "Within commercial Li-ion range (150-250 Wh/kg). Only vendor/handbook sources found - peer-reviewed cite TBD (candidate: Schmuch et al., Nat. Energy 2018)."
    status: strengthen-ref
  reference_cr2032_wh:
    value: 0.65
    ref: "Energizer/Panasonic CR2032 datasheet: 225 mAh @ 3 V = 0.675 Wh nominal; 0.65 Wh used as conservative usable energy."
    status: verified
