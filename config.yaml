# ════════════════════════════════════════════════════════════════════════
#  ModulUS system definition — the digital-twin spec.
#
#  Each section below holds ONE board's parameters. Which board class fills each
#  slot is chosen in modulus.py (System); here you set the numbers.
#
#               ┌──────────────┐
#               │  Transducer  │  external front · f_Tx is the runtime knob
#               └──────┬───────┘
#                 RF / echo                                       slot
#    ┌─────────────────┼──────────── ModulUS sandbox ──────────┐
#    │          ┌──────┴───────┐                                │
#    │          │    Pulse     │  pulser STHVUP32 + T/R         │   pulse
#    │          └──────┬───────┘                                │
#    │          ┌──────┴───────┐                                │
#    │          │    Echo      │  analog front-end (AFE)        │   echo
#    │          └──────┬───────┘                                │
#    │          ┌──────┴───────┐                                │
#    │          │    Core      │  STM32L496 + dual 5 Msps ADC   │   core
#    │          └──────┬───────┘                                │
#    │           Motherboard   (interconnects the 3 boards)     │
#    └─────────────────┼───────────────────────────────────────┘
#                  data │
#         ┌─────────────┴┐                     ┌──────────────┐
#         │Wireless link │  downstream         │   Battery    │  power src
#         └──────────────┘    radio             └──────────────┘   battery
#
#  Each param carries:
#    value / ref / status   —   status ∈
#       verified          value backed by a citation (ref points to it)
#       model-assumption  a number we chose; no citation (ref states the basis)
# ════════════════════════════════════════════════════════════════════════


# ── physics: medium + pulse constants ─────────────────────────────────────
#      (((   ~~~~~   ─►       c = speed of sound,   n = pulse cycles
physics:
  speed_of_sound_ms:
    value: 1540
    ref: "Standard soft-tissue value in pulse-echo ultrasound; AIUM; used in ModulUS IUS-2025 (cf. O'Brien, Prog. Biophys. Mol. Biol. 2007)."
    status: verified
  pulse_cycles:
    value: 5
    ref: "Design choice; ModulUS IUS-2025 experimental setup used 5-cycle excitation."
    status: verified


# ── Pulse board: pulser (STHVUP32) + T/R switch — send the pulse ──────────
#      ┌────────┐  HV pulse
#      │ pulser │──┬──►  transducer        (T/R routes Tx out / Rx in)
#      │  + T/R │◄─┘   echo
#      └────────┘
pulse:
  params:
    channels_exposed:
      value: 8
      ref: "ModulUS IUS-2025: STHVUP32 pulser, 8 of 32 channels exposed."
      status: verified
    power_w:
      value: 0.001
      ref: "Generic low-duty Tx, part of the ~20 mW static budget. NOT a literature value."
      status: model-assumption


# ── Echo board: analog front-end (AFE) — condition the echo ───────────────
#      RF ~~~►  ┌─────┐  ─►  _/‾\_     AFE = envelope | filter | amp | mixer ...
#               │ AFE │                (envelope detect, ~4x BW cut)
#               └─────┘
echo:
  params:
    bandwidth_reduction:
      value: 4
      ref: "ModulUS IUS-2025: raw mean 2.9 MHz -> envelope 0.7 MHz (~4x); 20 -> 5 Msps."
      status: verified
    power_bias_w:
      value: 0.004
      ref: "Generic always-on AFE bias, part of the ~20 mW budget. NOT a literature value."
      status: model-assumption
    power_active_w:
      value: 0.003
      ref: "Generic duty-scaled AFE active draw, part of the ~20 mW budget. NOT a literature value."
      status: model-assumption


# ── Core board: STM32L496 + dual 5 Msps ADC — digitize & compute ──────────
#      analog ─► ┌──────────┐ ─► ┌─────┐ ─►  features / store / link
#                │ ADC 2×5M │    │ MCU │
#                └──────────┘    └─────┘
core:
  params:
    adc_nyquist_factor:
      value: 2
      ref: "Nyquist-Shannon sampling theorem (fs >= 2x signal bandwidth)."
      status: verified
    adc_fs_max_hz:
      value: 5.0e+6
      ref: "STM32L496xx datasheet (ST): on-chip 12-bit ADC up to 5 Msps."
      status: verified
    adc_fom_j:
      value: 50.0e-15
      ref: "Literature-informed assumption: Walden FoM = P/(2^ENOB*fs); 50 fJ/conv-step is representative MCU-class (efficient ADCs <10 fJ; cf. Walden, IEEE JSAC 1999; Murmann ADC Survey). P_adc is negligible at our duty cycles."
      status: model-assumption
    power_idle_w:
      value: 0.015
      ref: "Generic MCU + housekeeping floor (dominates the ~20 mW budget). NOT a literature value."
      status: model-assumption
    power_feature_w:
      value: 0.002
      ref: "Generic on-device feature-compute draw. NOT a literature value."
      status: model-assumption
    feature_count:
      value: 16
      ref: "Illustrative features-mode payload per A-line (design choice)."
      status: model-assumption


# ── Wireless link (e.g. BLE) — downstream add-on, NOT a ModulUS board ─────
#      Core ─bits─►  (((•)))  ─►  host           ~1 Mb/s usable ceiling
radio:
  params:
    energy_per_bit_j:
      value: 20.0e-9
      ref: "Literature-informed assumption (~10-50 nJ/bit, strongly payload/interval-dependent; cf. Siekkinen et al., IEEE WCNCW 2012). No single citable value."
      status: model-assumption
    throughput_max_bps:
      value: 1.0e+6
      ref: "Conservative usable BLE ceiling. BLE 5 LE-2M application throughput tops ~1.3-1.4 Mb/s; we use 1 Mb/s. Cf. Tosi et al., Sensors 2017 (BLE performance review)."
      status: verified


# ── Battery — external power source ───────────────────────────────────────
#      [ + ||||| − ]   Wh ─►  cm³ / g           (sizes the wearable)
battery:
  params:
    density_vol_wh_l:
      value: 400
      ref: "Assumption in commercial Li-ion range (300-700 Wh/L), conservative for small-format cells. Citable candidate to verify: Schmuch et al., Nat. Energy 2018."
      status: model-assumption
    density_grav_wh_kg:
      value: 230
      ref: "Assumption in commercial Li-ion range (150-250 Wh/kg). Citable candidate to verify: Schmuch et al., Nat. Energy 2018."
      status: model-assumption
    reference_cr2032_wh:
      value: 0.65
      ref: "Energizer/Panasonic CR2032 datasheet: 225 mAh @ 3 V = 0.675 Wh nominal; 0.65 Wh used as conservative usable energy."
      status: verified
